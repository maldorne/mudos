name: Build and Publish to Github Container Registry 

on:
  push:
    branches: [ v22.2b14 ]

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Login onto ghcr
        run: |
          docker login --username maldorne-bot --password ${{ secrets.MALDORNE_BOT_GHCR_TOKEN }} ghcr.io
      - name: Build image
        run: |
          docker build --no-cache . -t ghcr.io/maldorne/mudos:v22.2b14
      - name: Publish image
        run: |
          docker push ghcr.io/maldorne/mudos:v22.2b14
